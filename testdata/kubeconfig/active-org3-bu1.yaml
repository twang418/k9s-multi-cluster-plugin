apiVersion: v1
kind: Config
current-context: org3-context
clusters:
  - name: org1-dev
    cluster:
      server: https://org1.example.invalid
  - name: org3-bu1
    cluster:
      server: https://org3.example.invalid
  - name: sandbox-team-a
    cluster:
      server: https://sandbox.example.invalid
contexts:
  - name: org1-context
    context:
      cluster: org1-dev
      user: org1-user
  - name: org3-context
    context:
      cluster: org3-bu1
      user: org3-user
  - name: sandbox-context
    context:
      cluster: sandbox-team-a
      user: sandbox-user
users:
  - name: org1-user
    user:
      token: test-token
  - name: org3-user
    user:
      token: test-token
  - name: sandbox-user
    user:
      token: test-token
