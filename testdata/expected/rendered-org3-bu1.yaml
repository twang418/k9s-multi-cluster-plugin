plugins:
  debug:
    shortCut: Shift-D
    description: Add debug container
    dangerous: true
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    inputs:
      - name: profile
        label: Debug profile
        type: dropdown
        required: true
        default: sysadmin
        options:
          - general
          - baseline
          - restricted
          - netadmin
          - sysadmin
          - legacy
      - name: share_processes
        label: Share processes
        type: bool
        required: true
        default: true
    args:
      - -c
      - >-
        kubectl debug -it --context "$CONTEXT" -n "$NAMESPACE" "$POD"
        --target "$NAME"
        --image "3333.dkr.ecr.ap-southeast-2.amazonaws.com/busybox:unstable-uclibc:1.37.0"
        --profile "$INPUT_PROFILE"
        $([ "$INPUT_SHARE_PROCESSES" = "true" ] && echo "--share-processes")
        -- sh
